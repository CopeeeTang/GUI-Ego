# ============================================================
# Proactive Streaming Video Understanding - Configuration
# ============================================================

# --- Dataset ---
dataset:
  root: /home/v-tangxin/GUI/data/EGTEA_Gaze_Plus
  clips_dir: cropped_clips
  annotations: raw_annotations/action_labels.csv
  gaze_dir: gaze_data/gaze_data
  split: 1                    # 1, 2, or 3
  fps: 24                     # native video fps
  resolution: [640, 480]

# --- Streaming Simulation ---
streaming:
  sample_fps: 2               # frames fed to VLM per second
  window_seconds: 60          # lookback window for context
  max_session_minutes: 30     # max session length to process

# --- Models ---
models:
  # Local VLM (Qwen3-VL on A100 80GB)
  qwen:
    model_id: Qwen/Qwen3-VL-8B-Instruct
    device: cuda
    dtype: bfloat16
    max_new_tokens: 512
    temperature: 0.3
    cache_dir: /home/v-tangxin/GUI/proactive-project/model_cache

  # API VLM (GPT-4o)
  gpt4o:
    model: gpt-4o
    api_version: "2024-09-01-preview"
    max_tokens: 1024
    temperature: 0.3
    # endpoint and key loaded from .env

# --- Proactive Intervention (RQ1) ---
proactive:
  # Trigger detection
  trigger:
    method: vlm_delta           # vlm_delta | threshold | task_graph
    delta_threshold: 0.3        # context change threshold
    min_interval_sec: 5.0       # minimum seconds between triggers
    soft_window_sec: 3.0        # ±δ for soft matching in evaluation

  # Content generation
  generation:
    max_tokens: 200
    include_next_step: true
    include_safety_warning: true

  # Ground truth
  gt:
    transition_gap_sec: 2.0     # gap between actions → idle trigger
    safety_verbs: [Cut, Pour, Operate, Crack]  # safety-critical actions
    lookahead_sec: 3.0          # predict next action within this window

# --- Memory System (RQ2) ---
memory:
  # Layer 1: Task Memory (always in context)
  task:
    max_tokens: 500
    update_on: step_transition  # when to update task state

  # Layer 2: Event Memory (structured, retrieved on demand)
  event:
    embedding_model: all-MiniLM-L6-v2
    max_events: 200
    retrieval_top_k: 5
    similarity_threshold: 0.5

  # Layer 3: Visual Working Memory (frame buffer)
  visual:
    recent_frames: 16           # keep last N frames uncompressed
    compressed_pool_size: 64    # max compressed historical frames
    compression: mean_pool      # mean_pool | sample

# --- Evaluation ---
eval:
  # Proactive metrics
  proactive:
    soft_window_sec: 3.0
    llm_judge_model: gpt4o      # for content quality scoring
    max_eval_sessions: 20

  # Memory metrics
  memory:
    num_queries_per_session: 10
    retrieval_k: [1, 3, 5]
    llm_judge_model: gpt4o

# --- Output ---
output:
  dir: /home/v-tangxin/GUI/proactive-project/experiments
  log_dir: /home/v-tangxin/GUI/proactive-project/logs
  save_frames: false            # save extracted frames for debugging
