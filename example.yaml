description: Test_reasoning

target:
  service: sing
  name: whitney06
  workspace_name: rlfoundationws

environment:
  image: vllm-0.8.2-patch-ubuntu-22.04:0.0.1
  registry: rlfoundation.azurecr.io
  setup:
    - sudo apt update
    - sudo apt install -y git cmake ccache
    - pip list
    - echo "[Used Disk]"
    - df -h
    - echo "[Mounted Storage]"
jobs:
- name: Test_reasoning
  sku: 1x192G4-MI300X@westcentralus
  sla_tier: Premium
  command:
  - pip3 install wandb
  - wandb login --relogin --host=https://microsoft-research.wandb.io ffb7b270c509a79ff33e07016e0c3eb72ef599c9
  - git clone https://github.com/volcengine/verl.git /home/aiscuser/verl
  - cd /home/aiscuser/verl && git checkout 15263cb86a464264edb1e5462675e25ddf6ff9d8
  - pip3 install -e /home/aiscuser/verl --no-deps
  - python3 /home/aiscuser/verl/examples/data_preprocess/gsm8k.py
  - python3 /home/aiscuser/verl/examples/data_preprocess/math.py
  - python3 /home/aiscuser/verl/examples/data_preprocess/geo3k.py --local_dir ~/data/geo3k
  - git clone https://github.com/hiyouga/MathRuler.git
  - cd MathRuler
  - pip install .
  - cd ..
  - export RAY_EXPERIMENTAL_NOSET_ROCR_VISIBLE_DEVICES=0
  - export HIP_VISIBLE_DEVICES=0,1,2,3
  - export ROCR_VISIBLE_DEVICES=0,1,2,3
  - export CUDA_VISIBLE_DEVICES=0,1,2,3
  - export HYDRA_FULL_ERROR=1
  - export FSDP_VERBOSE=1
  - export VLLM_ATTENTION_BACKEND=ROCmFlashAttention
  - export VLLM_USE_V1=0
  - export VLLM_USE_TRITON_FLASH_ATTN=0
  - wandb login --relogin --host=https://microsoft-research.wandb.io ffb7b270c509a79ff33e07016e0c3eb72ef599c9
  #- python3 -m verl.trainer.main_ppo algorithm.adv_estimator=grpo data.train_files=/home/aiscuser/data/gsm8k/train.parquet data.val_files=/home/aiscuser/data/gsm8k/test.parquet data.train_batch_size=1024 data.max_prompt_length=512 data.max_response_length=1024 data.filter_overlong_prompts=True data.truncation='error' actor_rollout_ref.model.path=Qwen/Qwen2-7B-Instruct actor_rollout_ref.actor.optim.lr=1e-6 actor_rollout_ref.model.use_remove_padding=True actor_rollout_ref.actor.ppo_mini_batch_size=256 actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=40 actor_rollout_ref.actor.use_kl_loss=False actor_rollout_ref.actor.kl_loss_coef=0 actor_rollout_ref.actor.kl_loss_type=low_var_kl actor_rollout_ref.actor.entropy_coeff=0 actor_rollout_ref.model.enable_gradient_checkpointing=True actor_rollout_ref.actor.fsdp_config.param_offload=False actor_rollout_ref.actor.fsdp_config.optimizer_offload=False actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=40 actor_rollout_ref.rollout.tensor_model_parallel_size=4 actor_rollout_ref.rollout.name=vllm actor_rollout_ref.rollout.gpu_memory_utilization=0.5 actor_rollout_ref.rollout.n=5 actor_rollout_ref.rollout.enforce_eager=False actor_rollout_ref.rollout.free_cache_engine=False actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=40 actor_rollout_ref.ref.fsdp_config.param_offload=True algorithm.use_kl_in_reward=False trainer.critic_warmup=0 trainer.logger=['console','wandb'] trainer.project_name='verl_grpo_example_gsm8k' trainer.experiment_name='qwen2_7b_function_rm' trainer.n_gpus_per_node=4 trainer.nnodes=1 trainer.save_freq=-1 trainer.test_freq=5 trainer.total_epochs=15
  - python3 -m verl.trainer.main_ppo algorithm.adv_estimator=grpo data.train_files=/home/aiscuser/data/geo3k/train.parquet data.val_files=/home/aiscuser/data/geo3k/test.parquet data.train_batch_size=512 data.max_prompt_length=1024 data.max_response_length=4096 data.filter_overlong_prompts=True data.truncation='error' data.image_key=images actor_rollout_ref.model.path=Qwen/Qwen2.5-VL-7B-Instruct actor_rollout_ref.actor.optim.lr=1e-6 actor_rollout_ref.model.use_remove_padding=True actor_rollout_ref.actor.ppo_mini_batch_size=128 actor_rollout_ref.actor.ppo_micro_batch_size_per_gpu=10 actor_rollout_ref.actor.use_kl_loss=False actor_rollout_ref.actor.kl_loss_coef=0 actor_rollout_ref.actor.kl_loss_type=low_var_kl actor_rollout_ref.actor.entropy_coeff=0 actor_rollout_ref.model.enable_gradient_checkpointing=True actor_rollout_ref.actor.fsdp_config.param_offload=False actor_rollout_ref.actor.fsdp_config.optimizer_offload=False actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=20 actor_rollout_ref.rollout.tensor_model_parallel_size=2 actor_rollout_ref.rollout.name=vllm actor_rollout_ref.rollout.gpu_memory_utilization=0.6 actor_rollout_ref.rollout.enable_chunked_prefill=False actor_rollout_ref.rollout.enforce_eager=False actor_rollout_ref.rollout.free_cache_engine=False actor_rollout_ref.rollout.n=5 actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=20 actor_rollout_ref.ref.fsdp_config.param_offload=True algorithm.use_kl_in_reward=False trainer.critic_warmup=0 trainer.logger=['console','wandb'] trainer.project_name='verl_grpo_example_geo3k' trainer.experiment_name='qwen2_5_vl_7b_function_rm' trainer.n_gpus_per_node=4 trainer.nnodes=1 trainer.save_freq=1 trainer.test_freq=5 trainer.total_epochs=80
  #- bash examples/grpo_trainer/run_qwen2_5_vl-7b.sh
  - sleep 1d
  identity: managed
  mpi: false
  process_count_per_node: 1
  submit_args:
    env:
      NCCL_DEBUG: INFO
      SHARED_MEMORY_PERCENT: 0.05
      _AZUREML_SINGULARITY_JOB_UAI: /subscriptions/092ec785-8dac-4a94-8dc2-8c92e558f797/resourcegroups/RLfoundation/providers/Microsoft.ManagedIdentity/userAssignedIdentities/rlfoundation_uai

  tags:
  - Project_Name:AIMicius
  - ProjectID:PRJ-0419-A47
  - Experiment:Continual_Pretraining    